name: Imgfly Backend Keep-Alive

on:
  schedule:
    - cron: '0 0 */3 * *' 
  workflow_dispatch: 

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Send Keep-Alive Ping
        run: |
          # We use the URL exactly as it is in your Jenkins environment
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}")
          
          echo "Supabase responded with status: $STATUS"
          
          # If status is 200, the job succeeds. Anything else (like 404 or 401) fails.
          if [ "$STATUS" -eq 200 ]; then
            echo "✅ Success: Supabase is alive!"
          else
            echo "❌ Error: Received status $STATUS. Check your URL or API Key."
            exit 1
          fi
